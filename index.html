<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Car Racing Game with Audio & Custom Controls</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; user-select: none; }
        body { margin: 0; padding: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .game-container { position: relative; width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; background: #222; }
        
        /* Top Status Bar */
        #status-bar { display: flex; justify-content: space-between; background: #111; color: #fff; padding: 10px 20px; font-size: 18px; font-weight: bold; z-index: 10; border-bottom: 2px solid #444; }
        #speedo { color: #00ffcc; }

        /* Main Environment */
        #world { position: relative; flex: 1; background: #2e7d32; overflow: hidden; display: flex; justify-content: center; }
        
        /* Road Setup */
        #road { position: relative; width: 280px; height: 100%; background: #333; border-left: 6px double #fff; border-right: 6px double #fff; overflow: hidden; }
        
        /* Road Lines */
        .line { position: absolute; width: 10px; height: 50px; background: #fff; left: 135px; }
        .special-line { position: absolute; width: 100%; height: 30px; left: 0; display: flex; background: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%) 0% 0%/20px 20px; }

        /* Heavy Audience / Aadmi on Side Tracks */
        .audience-track { position: absolute; top: 0; width: 90px; height: 100%; display: flex; flex-direction: column; justify-content: space-around; align-items: center; font-size: 18px; z-index: 2; }
        .track-left { left: 5px; }
        .track-right { right: 5px; }
        .spectator { display: inline-block; transition: transform 0.1s; margin: 5px 0; }

        /* Entities */
        #player-car { position: absolute; width: 45px; height: 80px; bottom: 30px; left: 115px; z-index: 5; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .enemy-car { position: absolute; width: 45px; height: 80px; z-index: 4; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        /* Car Details */
        .car-wheel { position: absolute; width: 8px; height: 16px; background: #111; border-radius: 2px; }
        .w-tl { top: 10px; left: -6px; } .w-tr { top: 10px; right: -6px; }
        .w-bl { bottom: 10px; left: -6px; } .w-br { bottom: 10px; right: -6px; }
        .glass { position: absolute; width: 33px; height: 20px; background: rgba(255,255,255,0.6); left: 6px; top: 25px; border-radius: 4px; }

        /* Custom Screen Side Buttons (S and B) */
        .side-btn { position: absolute; top: 40%; width: 65px; height: 100px; color: white; font-size: 28px; font-weight: bold; border-radius: 12px; display: flex; justify-content: center; align-items: center; z-index: 15; box-shadow: 0 6px 12px rgba(0,0,0,0.4); border: 3px solid #fff; cursor: pointer; }
        #btn-gas { left: 15px; background: rgba(46, 125, 50, 0.85); } /* Left Side S */
        #btn-brake { right: 15px; background: rgba(198, 40, 40, 0.85); } /* Right Side B */
        .side-btn:active, .side-btn.active { transform: scale(0.92); background: #fff !important; color: #111 !important; }

        /* Steering/Side Buttons Dashboard (Bottom Center) */
        #steering-dashboard { background: #1a1a1a; padding: 15px; display: flex; justify-content: center; border-top: 2px solid #444; z-index: 10; }
        .steer-group { display: flex; gap: 30px; }
        .steer-btn { width: 80px; height: 60px; background: #444; color: white; border: 2px solid #666; border-radius: 8px; font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        .steer-btn:active, .steer-btn.active { background: #00ffcc; color: #111; border-color: #fff; }

        /* UI Screens */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 20px; }
        .btn { background: #ff9800; color: white; border: none; padding: 12px 35px; font-size: 20px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(255,152,0,0.4); }
        
        .car-selector { display: flex; gap: 15px; margin: 20px 0; }
        .car-opt { width: 50px; height: 85px; border: 3px solid #555; border-radius: 8px; cursor: pointer; }
        .car-opt.selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="status-bar">
            <div id="score-val">Distance: 0m</div>
            <div id="speedo">0 KM/H</div>
        </div>

        <div id="world">
            <div class="audience-track track-left">
