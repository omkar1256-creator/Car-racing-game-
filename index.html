<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Cyber Racer Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; /* Solves mobile lag */
        }

        body {
            background: #0d0d1a;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Top Bar Info */
        #game-info {
            display: flex;
            gap: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 30px;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* Stylish Controls Area (Screen ke upar strictly fixed) */
        #controls-container {
            width: 380px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(20, 20, 35, 0.9);
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #1e1e38, #3b3b75);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 14px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .btn:active {
            transform: scale(0.92);
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px #00f0ff;
        }

        .btn-break { border-color: #ff0055; color: #ff0055; }
        .btn-break:active { background: #ff0055; color: #000; box-shadow: 0 0 15px #ff0055; }

        .btn-speed { border-color: #00ff66; color: #00ff66; }
        .btn-speed:active { background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66; }

        .btn-shield { 
            grid-column: span 4; 
            border-color: #f1c40f; 
            color: #f1c40f;
            background: linear-gradient(135deg, #2c2505, #4d3d04);
        }
        .btn-shield:active { background: #f1c40f; color: #000; box-shadow: 0 0 15px #f1c40f; }

        /* Game Screen Container */
        #game-container {
            position: relative;
            width: 380px;
            height: 480px;
            background: #111;
            overflow: hidden;
            border: 4px solid #333;
            border-radius: 15px;
            transition: background 1s; /* Theme changer transition */
        }

        /* Track Area */
        #track {
            position: absolute;
            width: 65%;
            height: 100%;
            left: 17.5%;
            background: #222;
            border-left: 4px dashed rgba(255,255,255,0.4);
            border-right: 4px dashed rgba(255,255,255,0.4);
        }

        /* Interactive Audience Side */
        .audience-side {
            position: absolute;
            width: 17.5%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            transition: transform 0.1s;
        }
        #left-audience { left: 0; }
        #right-audience { right: 0; }

        /* Jumpy audience animation class */
        .jump { transform: scale(1.3); }

        .road-line {
            position: absolute;
            width: 6px;
            height: 40px;
            background: rgba(255, 255, 255, 0.7);
            left: 50%;
            transform: translateX(-50%);
        }

        /* Player Cyber Car */
        #player {
            position: absolute;
            width: 38px;
            height: 65px;
            background: #00f0ff;
            bottom: 20px;
            left: 100px;
            border-radius: 6px;
            box-shadow: 0 0 15px #00f0ff;
            z-index: 3;
        }

        #player::before { /* Car windows */
            content: '';
            position: absolute;
            top: 12px; left: 6px; width: 26px; height: 18px;
            background: #000; border-radius: 3px;
        }

        /* Power-up States */
        #player.shielded { border: 3px solid #f1c40f; box-shadow: 0 0 25px #f1c40f; }
        #player.magnetized { border: 3px solid #00ff66; box-shadow: 0 0 25px #00ff66; }

        /* Game Objects */
        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 12px #f1c40f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 11px;
            z-index: 2;
            transition: all 0.2s ease-in; /* smooth magnet pull */
        }

        .obstacle {
            position: absolute;
            width: 38px;
            height: 60px;
            background: #ff0055;
            border-radius: 6px;
            box-shadow: 0 0 12px #ff0055;
            z-index: 2;
        }

        .magnet-power {
            position: absolute;
            width: 26px;
            height: 26px;
            background: #00ff66;
            border-radius: 6px;
            box-shadow: 0 0 15px #00ff66;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 2;
        }

        /* Blast Effect */
        .blast {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffcc00, #ff3300, transparent);
            border-radius: 50%;
            animation: explode 0.4s forwards;
            z-index: 4;
        }

        @keyframes explode {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Overlay Messages */
        #referee {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            z-index: 5;
            background: rgba(0,0,0,0.6);
            padding: 2px 10px;
            border-radius: 5px;
        }

        #msg-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: rgba(10, 10, 25, 0.95);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #00f0ff;
            z-index: 10;
            width: 80%;
        }
    </style>
</head>
<body>

    <div id="controls-container">
        <button class="btn" id="btn-left">◀ LEFT</button>
        <button class="btn btn-speed" id="btn-speed">SPD +</button>
        <button class="btn btn-break" id="btn-break">BREAK</button>
        <button class="btn" id="btn-right">RIGHT ▶</button>
        <button class="btn btn-shield" id="btn-shield">ACTIVATE PROTECTION SHIELD</button>
    </div>

    <div id="game-info">
        <div>SCORE:<span id="score">0</span></div>
        <div>💰:<span id="coins">0</span></div>
        <div>LVL:<span id="level">1</span></div>
        <div>SPD:<span id="speed-text">3</span></div>
    </div>

    <div id="game-container">
        <div id="referee">👨‍ref</div>
        <div id="left-audience" class="audience-side">👵👏<br>👦🙌<br>👱‍♂️🕺</div>
        <div id="right-audience" class="audience-side">👴👏<br>👧🙌<br>👨‍🦰🕺</div>
        <div id="track">
            <div id="player"></div>
        </div>
        <div id="msg-overlay">🏁 START LINE 🏁<br><span style="font-size:13px; color:#00f0ff;"><br>Tap Screen to Start Match</span></div>
    </div>

    <script>
        // STRICTLY BLOCK MOBILE ROTATION (Tilt Control Completely Disabled)
        window.addEventListener('deviceorientation', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);

        const player = document.getElementById('player');
        const track = document.getElementById('track');
        const scoreDisplay = document.getElementById('score');
        const coinsDisplay = document.getElementById('coins');
        const levelDisplay = document.getElementById('level');
        const speedDisplay = document.getElementById('speed-text');
        const msgOverlay = document.getElementById('msg-overlay');
        const referee = document.getElementById('referee');
        const gameContainer = document.getElementById('game-container');
        const leftAudience = document.getElementById('left-audience');
        const rightAudience = document.getElementById('right-audience');

        // Web Audio Synthesis for sound effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        // Core Variables
        let playerX = 100;
        let score = 0, coins = 0, level = 1;
        let baseSpeed = 3, currentSpeed = 3;
        const maxSpeedLimit = 7; // Controlled Top Speed
        let isGameOver = true;
        let hasShield = false, hasMagnet = false;
        
        let gameObjects = [];
        let roadLines = [];
        const trackWidth = 247; // 65% of 380px
        const carWidth = 38;

        // Draw Moving Road Lines
        for(let i=0; i<5; i++) {
            let line = document.createElement('div');
            line.classList.add('road-line');
            line.style.top = (i * 110) + 'px';
            track.appendChild(line);
            roadLines.push(line);
        }

        // Button Listeners (Using explicit click/pointer events to avoid ghost triggers)
        document.getElementById('btn-left').addEventListener('click', (e) => { e.preventDefault(); moveCar('left'); });
        document.getElementById('btn-right').addEventListener('click', (e) => { e.preventDefault(); moveCar('right'); });
        document.getElementById('btn-speed').addEventListener('click', (e) => { e.preventDefault(); changeSpeed(1); });
        document.getElementById('btn-break').addEventListener('click', (e) => { e.preventDefault(); changeSpeed(-1); });
        document.getElementById('btn-shield').addEventListener('click', (e) => { e.preventDefault(); activateShield(); });

        gameContainer.addEventListener('click', () => {
            if (isGameOver) resetGame();
        });

        function resetGame() {
            isGameOver = false;
            score = 0; coins = 0; level = 1;
            currentSpeed = baseSpeed;
            playerX = (trackWidth / 2) - (carWidth / 2);
            player.style.left = playerX + 'px';
            player.className = ''; 
            hasShield = false; hasMagnet = false;
            gameContainer.style.background = "#111"; // Default Theme
            
            gameObjects.forEach(obj => obj.element.remove());
            gameObjects = [];
            
            msgOverlay.style.display = 'none';
            referee.innerHTML = "🏁 GO GO GO!";
            playSound(900, 'sine', 0.4); // Whistle sound
            setTimeout(() => { referee.innerHTML = "👨‍ref"; }, 1200);

            updateUI();
            gameLoop();
        }

        function moveCar(direction) {
            if(isGameOver) return;
            if(direction === 'left' && playerX > 15) {
                playerX -= 74; // Snap to lanes smoothly
            } else if(direction === 'right' && playerX < (trackWidth - carWidth - 15)) {
                playerX += 74;
            }
            player.style.left = playerX + 'px';
            playSound(300, 'triangle', 0.05); // Move sound
        }

        function changeSpeed(amount) {
            if(isGameOver) return;
            let targetSpeed = currentSpeed + amount;
            if(targetSpeed >= baseSpeed && targetSpeed <= maxSpeedLimit) {
                currentSpeed = targetSpeed;
            }
            updateUI();
        }

        function activateShield() {
            if(isGameOver || hasShield) return;
            hasShield = true;
            if(!hasMagnet) player.className = 'shielded';
            playSound(600, 'square', 0.2);
            setTimeout(() => {
                hasShield = false;
                if(!hasMagnet) player.className = '';
            }, 6000); // 6 Seconds Protection Sit
        }

        function triggerAudienceJump() {
            leftAudience.classList.add('jump');
            rightAudience.classList.add('jump');
            setTimeout(() => {
                leftAudience.classList.remove('jump');
                rightAudience.classList.remove('jump');
            }, 200);
        }

        function changeEnvironmentTheme(lvl) {
            // Dynamic theme system based on levels
            if(lvl === 2) gameContainer.style.background = "#2d142c"; // Sunset Evening
            if(lvl === 3) gameContainer.style.background = "#0f2027"; // Midnight Neon
            if(lvl >= 4) gameContainer.style.background = "#1a0033";  // Cyber Space Run
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            coinsDisplay.innerText = coins;
            levelDisplay.innerText = level;
            speedDisplay.innerText = currentSpeed;
        }

        // Main Driving Loop
        function gameLoop() {
            if(isGameOver) return;

            score++;
            if(score % 400 === 0) { // Dynamic Levels Up
                level++;
                baseSpeed += 0.4;
                currentSpeed = Math.min(currentSpeed + 1, maxSpeedLimit);
                referee.innerHTML = "📢 LEVEL UP!";
                changeEnvironmentTheme(level);
                playSound(800, 'sine', 0.5);
                triggerAudienceJump();
                setTimeout(() => { referee.innerHTML = "👨‍ref"; }, 1200);
            }

            updateUI();

            // Parallax Track Moving Effect
            roadLines.forEach(line => {
                let top = parseFloat(line.style.top) + currentSpeed;
                if(top > 480) top = -40;
                line.style.top = top + 'px';
            });

            // Random spawns based on levels
            if(Math.random() < 0.02 + (level * 0.003)) {
                spawnItem();
            }

            // Object physics and interactions
            for(let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                let currentTop = parseFloat(obj.element.style.top) + currentSpeed;
                let objLeft = parseFloat(obj.element.style.left);

                // MAGNET POWER LOGIC: Pull coins towards the car
                if(hasMagnet && obj.type === 'coin' && currentTop > 150) {
                    let diffX = playerX - objLeft;
                    objLeft += diffX * 0.15; // Smooth gravity pull
                    obj.element.style.left = objLeft + 'px';
                }

                obj.element.style.top = currentTop + 'px';

                // Hitbox Collision Calculation
                if(currentTop > 390 && currentTop < 455) {
                    if(Math.abs(objLeft - playerX) < 32) {
                        
                        if(obj.type === 'coin') {
                            coins++;
                            triggerAudienceJump();
                            playSound(1000, 'sine', 0.08);
                            obj.element.remove();
                            gameObjects.splice(i, 1);
                            continue;
                        } 
                        
                        else if(obj.type === 'magnet') {
                            hasMagnet = true;
                            player.className = 'magnetized';
                            playSound(440, 'square', 0.3);
                            obj.element.remove();
                            gameObjects.splice(i, 1);
                            // Magnet lasts for 7 seconds
                            setTimeout(() => {
                                hasMagnet = false;
                                player.className = hasShield ? 'shielded' : '';
                            }, 7000);
                            continue;
                        }
                        
                        else if(obj.type === 'obstacle') {
                            if(hasShield) { // Shield absorbs impact
                                hasShield = false;
                                player.className = hasMagnet ? 'magnetized' : '';
                                createBlastEffect(objLeft, currentTop);
                                playSound(150, 'triangle', 0.2);
                                obj.element.remove();
                                gameObjects.splice(i, 1);
                                continue;
                            } else {
                                handleCrash(playerX, 390);
                                return;
                            }
                        }
                    }
                }

                // Cleanup missed items
                if(currentTop > 480) {
                    obj.element.remove();
                    gameObjects.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let lanes = [16, 90, 164]; // Perfectly aligned 3 driving lanes
            let randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            
            let rand = Math.random();
            let type = 'obstacle';
            
            if(rand > 0.75) type = 'coin';
            else if(rand > 0.70 && rand <= 0.75) type = 'magnet'; // Rare spawn

            let element = document.createElement('div');
            element.style.top = '-70px';
            element.style.left = randomLane + 'px';
            
            if(type === 'coin') {
                element.classList.add('coin');
                element.innerText = '🪙';
            } else if(type === 'magnet') {
                element.classList.add('magnet-power');
                element.innerText = '🧲';
            } else {
                element.classList.add('obstacle');
            }
            
            track.appendChild(element);
            gameObjects.push({ type: type, element: element });
        }

        function createBlastEffect(x, y) {
            let blast = document.createElement('div');
            blast.classList.add('blast');
            blast.style.left = (x + 10) + 'px';
            blast.style.top = y + 'px';
            track.appendChild(blast);
