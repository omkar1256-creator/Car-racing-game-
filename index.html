<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic City Racer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: #111;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Top Bar Info */
        #game-info {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Game Container */
        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background: #222;
            overflow: hidden;
            border: 4px solid #444;
            border-radius: 10px;
        }

        /* Stylish Controls (Screen ke thoda upar set kiya hai) */
        #controls-container {
            width: 400px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            margin-bottom: 15px; /* Pushes the game down slightly */
        }

        .btn {
            background: linear-gradient(135deg, #00f0ff, #0072ff);
            border: none;
            color: white;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
            text-transform: uppercase;
            transition: transform 0.1s, filter 0.2s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .btn-break { background: linear-gradient(135deg, #ff0055, #990033); box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3); }
        .btn-speed { background: linear-gradient(135deg, #00ff66, #009933); box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3); }
        .btn-shield { background: linear-gradient(135deg, #f1c40f, #f39c12); box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3); }

        /* Track & Elements */
        #track {
            position: absolute;
            width: 60%;
            height: 100%;
            left: 20%;
            background: #333;
            border-left: 5px dashed #fff;
            border-right: 5px dashed #fff;
        }

        /* Audience Side */
        .audience-side {
            position: absolute;
            width: 20%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 20px;
        }
        #left-audience { left: 0; }
        #right-audience { right: 0; }

        /* Line Anim */
        .road-line {
            position: absolute;
            width: 6px;
            height: 40px;
            background: white;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Player Car */
        #player {
            position: absolute;
            width: 40px;
            height: 70px;
            background: #00f0ff;
            bottom: 20px;
            left: 100px;
            border-radius: 5px;
            transition: left 0.2s, border 0.2s;
            box-shadow: 0 0 15px #00f0ff;
        }

        #player.shielded {
            border: 3px solid #f1c40f;
            box-shadow: 0 0 25px #f1c40f;
        }

        /* Game Objects */
        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 10px #f1c40f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 12px;
        }

        .obstacle {
            position: absolute;
            width: 40px;
            height: 65px;
            background: #ff0055;
            border-radius: 5px;
            box-shadow: 0 0 10px #ff0055;
        }

        /* Referee & Messages */
        #referee {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            z-index: 10;
        }

        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="controls-container">
        <button class="btn" onclick="moveCar('left')">◀ Left</button>
        <button class="btn btn-speed" onclick="changeSpeed(1)">Speed +</button>
        <button class="btn btn-break" onclick="changeSpeed(-1)">Break</button>
        <button class="btn" onclick="moveCar('right')">Right ▶</button>
        <button class="btn btn-shield" style="grid-column: span 4;" onclick="activateShield()">Activate Shield (Sit Protect)</button>
    </div>

    <div id="game-info">
        <div>Score: <span id="score">0</span></div>
        <div>Coins: <span id="coins">0</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>Speed: <span id="speed-text">2</span></div>
    </div>

    <div id="game-container">
        <div id="referee">👨‍ref</div>
        <div id="left-audience" class="audience-side">👤👤<br>👤👤<br>👤👤</div>
        <div id="right-audience" class="audience-side">👤👤<br>👤👤<br>👤👤</div>
        <div id="track">
            <div id="player"></div>
        </div>
        <div id="msg-overlay">Click to Start<br><span style="font-size:14px;">Level 1 Start Point</span></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const track = document.getElementById('track');
        const scoreDisplay = document.getElementById('score');
        const coinsDisplay = document.getElementById('coins');
        const levelDisplay = document.getElementById('level');
        const speedDisplay = document.getElementById('speed-text');
        const msgOverlay = document.getElementById('msg-overlay');
        const referee = document.getElementById('referee');

        // Audio setup (Web Audio API for synthesis - No external files needed)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playWhistle() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime); // High pitch whistle
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // Game Variables
        let playerX = 100; // Initial center position inside track
        let score = 0;
        let coins = 0;
        let level = 1;
        let baseSpeed = 3;
        let currentSpeed = 3;
        let maxSpeedLimit = 7; // Speed bahut zyada nahi badhegi
        let isGameOver = true;
        let hasShield = false;
        
        let gameObjects = [];
        let roadLines = [];

        // Track boundary settings
        const trackWidth = 240; // 60% of 400px container
        const carWidth = 40;

        // Initialize Road Lines
        for(let i=0; i<5; i++) {
            let line = document.createElement('div');
            line.classList.add('road-line');
            line.style.top = (i * 120) + 'px';
            track.appendChild(line);
            roadLines.push(line);
        }

        // Start Game Click
        document.getElementById('game-container').addEventListener('click', () => {
            if (isGameOver) {
                resetGame();
            }
        });

        function resetGame() {
            isGameOver = false;
            score = 0;
            coins = 0;
            level = 1;
            currentSpeed = baseSpeed;
            playerX = (trackWidth / 2) - (carWidth / 2);
            player.style.left = playerX + 'px';
            player.classList.remove('shielded');
            hasShield = false;
            
            // Clear old elements
            gameObjects.forEach(obj => obj.element.remove());
            gameObjects = [];
            
            msgOverlay.style.display = 'none';
            
            // Rephry (Referee) city bajayega start me
            referee.innerHTML = "🟨👨‍ref 🏁";
            playWhistle();
            setTimeout(() => { referee.innerHTML = "👨‍ref"; }, 1000);

            updateUI();
            gameLoop();
        }

        // Buttons Controls (Side badalne ke liye)
        function moveCar(direction) {
            if(isGameOver) return;
            if(direction === 'left' && playerX > 10) {
                playerX -= 40;
            } else if(direction === 'right' && playerX < (trackWidth - carWidth - 10)) {
                playerX += 40;
            }
            player.style.left = playerX + 'px';
        }

        // Speed Controller Buttons (Limit controls)
        function changeSpeed(amount) {
            if(isGameOver) return;
            let targetSpeed = currentSpeed + amount;
            // Cap speed so it doesn't get ridiculously fast
            if(targetSpeed >= baseSpeed && targetSpeed <= maxSpeedLimit) {
                currentSpeed = targetSpeed;
            }
            updateUI();
        }

        // Protect Sit (Shield) Activation
        function activateShield() {
            if(isGameOver || hasShield) return;
            hasShield = true;
            player.classList.add('shielded');
            // Shield expires after 5 seconds
            setTimeout(() => {
                hasShield = false;
                player.classList.remove('shielded');
            }, 5000);
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            coinsDisplay.innerText = coins;
            levelDisplay.innerText = level;
            speedDisplay.innerText = currentSpeed;
        }

        // Game Loop
        function gameLoop() {
            if(isGameOver) return;

            score++;
            updateUI();

            // Level Upgrade Logic
            if(score % 500 === 0) {
                level++;
                baseSpeed += 0.5;
                maxSpeedLimit += 0.5;
                currentSpeed = Math.min(currentSpeed + 1, maxSpeedLimit);
                referee.innerHTML = "📢 level up!";
                playWhistle(); // Level up alert whistle
                setTimeout(() => { referee.innerHTML = "👨‍ref"; }, 1000);
            }

            // Move lines to simulate driving
            roadLines.forEach(line => {
                let top = parseFloat(line.style.top) + currentSpeed;
                if(top > 500) top = -40;
                line.style.top = top + 'px';
            });

            // Spawn Obstacles and Coins randomly
            if(Math.random() < 0.02) {
                spawnObject();
            }

            // Move and manage Game Objects
            for(let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                let currentTop = parseFloat(obj.element.style.top) + currentSpeed;
                obj.element.style.top = currentTop + 'px';

                // Check Collision
                if(currentTop > 410 && currentTop < 480) { // Player vertical sweet-spot
                    let objLeft = parseFloat(obj.element.style.left);
                    // Checking horizontal overlap
                    if(Math.abs(objLeft - playerX) < 35) {
                        if(obj.type === 'coin') {
                            coins++;
                            obj.element.remove();
                            gameObjects.splice(i, 1);
                            continue;
                        } else if(obj.type === 'obstacle') {
                            if(hasShield) {
                                // Shield protects the car once
                                hasShield = false;
                                player.classList.remove('shielded');
                                obj.element.remove();
                                gameObjects.splice(i, 1);
                                continue;
                            } else {
                                endGame();
                                return;
                            }
                        }
                    }
                }

                // Remove out of screen objects
                if(currentTop > 500) {
                    obj.element.remove();
                    gameObjects.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnObject() {
            let lanes = [15, 95, 175]; // 3 explicit virtual lanes inside track
            let randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            let type = Math.random() > 0.4 ? 'coin' : 'obstacle';

            let element = document.createElement('div');
            element.classList.add(type);
            if(type === 'coin') element.innerText = 'C';
            element.style.top = '-80px';
            element.style.left = randomLane + 'px';
            
            track.appendChild(element);
            gameObjects.push({ type: type, element: element });
        }

        function endGame() {
            isGameOver = true;
            referee.innerHTML = "🟥👨‍ref";
            playWhistle();
            msgOverlay.innerHTML = `GAME OVER<br>Final Score: ${score}<br><span style="font-size:14px;">Tap to Restart</span>`;
            msgOverlay.style.display = 'block';
        }
    </script>
</body>
</html>
