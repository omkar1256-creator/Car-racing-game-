
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Car Racing Game</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; user-select: none; }
        body { margin: 0; padding: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .game-container { position: relative; width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; }
        
        /* Top Status Bar */
        #status-bar { display: flex; justify-content: space-between; background: #111; color: #fff; padding: 10px 20px; font-size: 18px; font-weight: bold; z-index: 10; border-bottom: 2px solid #444; }
        #speedo { color: #00ffcc; }

        /* Main Environment */
        #world { position: relative; flex: 1; background: #2e7d32; /* Green Maidan */ overflow: hidden; display: flex; justify-content: center; }
        
        /* Road Setup */
        #road { position: relative; width: 300px; height: 100%; background: #333; border-left: 6px double #fff; border-right: 6px double #fff; overflow: hidden; }
        
        /* Road Lines */
        .line { position: absolute; width: 10px; height: 50px; background: #fff; left: 145px; }
        
        /* Start & Finish Lines */
        .special-line { position: absolute; width: 100%; height: 30px; left: 0; display: flex; background: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%) 0% 0%/20px 20px; }

        /* Audience / Aadmi on Side Tracks */
        .spectator { position: absolute; font-size: 20px; transition: transform 0.1s; }
        .spec-left { left: 20px; }
        .spec-right { right: 20px; }

        /* Entities */
        #player-car { position: absolute; width: 45px; height: 80px; bottom: 40px; left: 125px; z-index: 5; transition: transform 0.1s; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .enemy-car { position: absolute; width: 45px; height: 80px; z-index: 4; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

        /* Car Design details inside code via colors/styles */
        .car-wheel { position: absolute; width: 8px; height: 16px; background: #111; border-radius: 2px; }
        .w-tl { top: 10px; left: -6px; } .w-tr { top: 10px; right: -6px; }
        .w-bl { bottom: 10px; left: -6px; } .w-br { bottom: 10px; right: -6px; }
        .glass { position: absolute; width: 33px; height: 20px; background: rgba(255,255,255,0.6); left: 6px; top: 25px; border-radius: 4px; }

        /* UI Screens */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 20px; }
        .btn { background: #ff9800; color: white; border: none; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(255,152,0,0.4); }
        .btn:active { transform: scale(0.95); }
        
        /* Car Selection */
        .car-selector { display: flex; gap: 15px; margin: 20px 0; }
        .car-opt { width: 60px; height: 100px; border: 3px solid #555; border-radius: 8px; cursor: pointer; position: relative; }
        .car-opt.selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }

        /* Dashboard/Controls Panel */
        #controls { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #444; z-index: 10; }
        .control-group { display: flex; gap: 10px; }
        .c-btn { width: 65px; height: 65px; background: #333; color: white; border: 2px solid #555; border-radius: 50%; font-size: 14px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .c-btn:active, .c-btn.active { background: #555; border-color: #00ffcc; }
        #btn-gas { background: #2e7d32; } #btn-brake { background: #c62828; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="status-bar">
            <div id="score-val">Distance: 0m</div>
            <div id="speedo">0 KM/H</div>
        </div>

        <div id="world">
            <div class="spectator spec-left" style="top: 100px;">🧍‍♂️</div>
            <div class="spectator spec-left" style="top: 250px;">🧍‍♀️</div>
            <div class="spectator spec-left" style="top: 400px;">🧑‍🤝‍🧑</div>
            <div class="spectator spec-left" style="top: 550px;">🧍‍♂️</div>

            <div class="spectator spec-right" style="top: 150px;">🧍‍♀️</div>
            <div class="spectator spec-right" style="top: 300px;">🧍‍♂️</div>
            <div class="spectator spec-right" style="top: 450px;">🧑‍🤝‍🧑</div>
            <div class="spectator spec-right" style="top: 580px;">🧍‍♀️</div>

            <div id="road">
                <div class="special-line" id="start-line" style="bottom: 120px;"></div>
                <div class="special-line" id="finish-line" style="top: -200px; display: none;"></div>
                <div id="player-car">
                    <div class="car-wheel w-tl"></div><div class="car-wheel w-tr"></div>
                    <div class="car-wheel w-bl"></div><div class="car-wheel w-br"></div>
                    <div class="glass"></div>
                </div>
            </div>
        </div>

        <div id="controls">
            <div class="control-group">
                <div class="c-btn" id="btn-left">◀ LEFT</div>
                <div class="c-btn" id="btn-right">RIGHT ▶</div>
            </div>
            <div class="control-group">
                <div class="c-btn" id="btn-brake">BRAKE</div>
                <div class="c-btn" id="btn-gas">GAS</div>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <h2>REAL FEEL RACING</h2>
            <p>Select Your Car:</p>
            <div class="car-selector">
                <div class="car-opt selected" data-color="#e63946" style="background: #e63946;"></div>
                <div class="car-opt" data-color="#ffb703" style="background: #ffb703;"></div>
                <div class="car-opt" data-color="#1d3557" style="background: #1d3557;"></div>
            </div>
            <p>Reach 500 meters to Cross the Finish Line!</p>
            <button class="btn" id="start-btn">START RACE</button>
        </div>

        <div id="end-screen" class="screen" style="display: none;">
            <h2 id="end-title">GAME OVER</h2>
            <p id="end-sub">You crashed into an obstacle!</p>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const road = document.getElementById('road');
        const playerCar = document.getElementById('player-car');
        const startLine = document.getElementById('start-line');
        const finishLine = document.getElementById('finish-line');
        const speedo = document.getElementById('speedo');
        const scoreVal = document.getElementById('score-val');
        
        // Screens
        const menuScreen = document.getElementById('menu-screen');
        const endScreen = document.getElementById('end-screen');
        const carOptions = document.querySelectorAll('.car-opt');

        // States
        let gameActive = false;
        let distance = 0;
        let currentSpeed = 0;
        let maxSpeed = 15;
        let roadPos = 0;
        let playerX = 125; 
        let selectedColor = "#e63946";
        let enemies = [];
        let lines = [];
        
        let inputs = { left: false, right: false, gas: false, brake: false };

        // Car Selection Setup
        carOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                carOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedColor = opt.getAttribute('data-color');
            });
        });

        // Controls Event Binding (Mouse/Touch & Keyboard)
        const bindControl = (id, property) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); inputs[property] = true; el.classList.add('active'); };
            const end = () => { inputs[property] = false; el.classList.remove('active'); };
            el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
            el.addEventListener('touchstart', start); el.addEventListener('touchend', end);
        };
        bindControl('btn-left', 'left'); bindControl('btn-right', 'right');
        bindControl('btn-gas', 'gas'); bindControl('btn-brake', 'brake');

        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') inputs.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') inputs.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w') inputs.gas = true;
            if(e.key === 'ArrowDown' || e.key === 's') inputs.brake = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') inputs.left = false;
            if(e.key === 'ArrowRight' || e.key === 'd') inputs.right = false;
            if(e.key === 'ArrowUp' || e.key === 'w') inputs.gas = false;
            if(e.key === 'ArrowDown' || e.key === 's') inputs.brake = false;
        });

        // Generate Road Striped Lines
        for(let i=0; i<15; i++) {
            let l = document.createElement('div');
            l.className = 'line';
            l.style.top = (i * 50) + 'px';
            road.appendChild(l);
            lines.push(l);
        }

        document.getElementById('start-btn').addEventListener('click', initGame);
        document.getElementById('restart-btn').addEventListener('click', initGame);

        function initGame() {
            menuScreen.style.display = 'none';
            endScreen.style.display = 'none';
            playerCar.style.background = selectedColor;
            
            // Reset Variables
            gameActive = true;
            distance = 0;
            currentSpeed = 0;
            playerX = 125;
            roadPos = 0;
            
            startLine.style.bottom = '120px';
            finishLine.style.display = 'none';
            finishLine.style.top = '-200px';

            // Clear old enemies
            enemies.forEach(e => e.remove());
            enemies = [];

            spawnEnemy();
            window.requestAnimationFrame(updateLoop);
        }

        function spawnEnemy() {
            if(!gameActive || distance > 460) return;
            let e = document.createElement('div');
            e.className = 'enemy-car';
            e.style.background = Math.random() > 0.5 ? '#00b4d8' : '#7209b7';
            e.style.top = '-100px';
            e.style.left = Math.floor(Math.random() * 250) + 'px';
            
            // Inner structures for real feel
            e.innerHTML = '<div class="car-wheel w-tl"></div><div class="car-wheel w-tr"></div><div class="car-wheel w-bl"></div><div class="car-wheel w-br"></div><div class="glass" style="top:45px;"></div>';
            
            road.appendChild(e);
            enemies.push(e);

            // Spawn next enemy randomly
            setTimeout(spawnEnemy, Math.random() * 2000 + 1500);
        }

        function updateLoop() {
            if (!gameActive) return;

            // 1. Handle Speed & Physics (Brake / Gas)
            if (inputs.gas) {
                currentSpeed = Math.min(currentSpeed + 0.2, maxSpeed);
            } else if (inputs.brake) {
                currentSpeed = Math.max(currentSpeed - 0.5, 0);
            } else {
                currentSpeed = Math.max(currentSpeed - 0.1, 0); // Natural friction
            }

            // Update UI meters
            speedo.innerText = Math.round(currentSpeed * 12) + " KM/H";
            if(currentSpeed > 0 && distance < 500) {
                distance += (currentSpeed * 0.05);
                scoreVal.innerText = `Distance: ${Math.floor(distance)}m`;
            }

            // 2. Handle Steering
            if (inputs.left && playerX > 5) { playerX -= 4 * (currentSpeed/maxSpeed + 0.3); playerCar.style.transform = 'rotate(-5deg)'; }
            else if (inputs.right && playerX < 250) { playerX += 4 * (currentSpeed/maxSpeed + 0.3); playerCar.style.transform = 'rotate(5deg)'; }
            else { playerCar.style.transform = 'rotate(0deg)'; }
            playerCar.style.left = playerX + 'px';

            // 3. Move Environment Items (Lines, Audience cheering effect)
            roadPos += currentSpeed;
            lines.forEach((l, idx) => {
                let top = (idx * 60) + (roadPos % 60);
                l.style.top = top + 'px';
            });

            // Move Start Line out of view
            if(distance < 50) {
                let sTop = 450 + (distance * 10);
                startLine.style.top = sTop + 'px';
            } else { startLine.style.top = '-200px'; }

            // Bring Finish Line at 500m
            if(distance >= 460) {
                finishLine.style.display = 'flex';
                let fTop = -100 + ((distance - 460) * 15);
                finishLine.style.top = fTop + 'px';
                
                if(fTop > 450) {
                    triggerWin();
                    return;
                }
            }

            // Cheering audience effect
            if(currentSpeed > 2) {
                document.querySelectorAll('.spectator').forEach(s => {
                    s.style.transform = `scale(${1 + Math.sin(roadPos*0.05)*0.1})`;
                });
            }

            // 4. Move Enemies & Check Collision
            for(let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let eTop = parseFloat(e.style.top);
                eTop += currentSpeed * 0.6 + 2; // Enemy relative movement
                e.style.top = eTop + 'px';

                // Check Crash
                if (checkCollision(playerCar, e)) {
                    triggerGameOver();
                    return;
                }

                // Delete out of boundary enemy
                if (eTop > 700) {
                    e.remove();
                    enemies.splice(i, 1);
                }
            }

            window.requestAnimationFrame(updateLoop);
        }

        function checkCollision(a, b) {
            let aR = a.getBoundingClientRect();
            let bR = b.getBoundingClientRect();
            return !(aR.bottom < bR.top || aR.top > bR.bottom || aR.right < bR.left || aR.left > bR.right);
        }

        function triggerGameOver() {
            gameActive = false;
            endScreen.style.display = 'flex';
            document.getElementById('end-title').innerText = "CRASHED! 💥";
            document.getElementById('end-title').style.color = "#ff3333";
            document.getElementById('end-sub').innerText = `You crashed at ${Math.floor(distance)} meters! Try again.`;
        }

        function triggerWin() {
            gameActive = false;
            endScreen.style.display = 'flex';
            document.getElementById('end-title').innerText = "VICTORY! 🏆";
            document.getElementById('end-title').style.color = "#00ffcc";
            document.getElementById('end-sub').innerText = "Awesome driving! You crossed the Finish Line successfully!";
        }
    </script>
</body>
</html>
