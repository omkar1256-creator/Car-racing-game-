<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Car Racing Game</title>
    <style>
        /* CSS DESIGNING CODE */
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 5px;
            z-index: 10;
        }

        #gameArea {
            width: 400px;
            height: 600px;
            background: #333;
            border-left: 5px dashed white;
            border-right: 5px dashed white;
            position: relative;
            overflow: hidden;
        }

        #myCar {
            width: 50px;
            height: 80px;
            background: red;
            position: absolute;
            bottom: 20px;
            left: 175px;
            border-radius: 5px;
        }

        #enemyCar {
            width: 50px;
            height: 80px;
            background: blue;
            position: absolute;
            top: -100px;
            left: 175px;
            border-radius: 5px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="score">Score: 0</div>
        <div id="gameArea">
            <div id="myCar"></div>
            <div id="enemyCar"></div>
        </div>
        <div id="startScreen">
            <p>Press <b>Arrow Keys</b> to move.<br>Click here to Start the Game!</p>
        </div>
    </div>

    <script>
        // JAVASCRIPT GAME LOGIC CODE
        const gameArea = document.getElementById('gameArea');
        const myCar = document.getElementById('myCar');
        const enemyCar = document.getElementById('enemyCar');
        const scoreDisplay = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');

        let gamePlay = false;
        let score = 0;
        let speed = 5;

        let player = { x: 175, y: 500, speed: 7 };
        let keys = { ArrowLeft: false, ArrowRight: false };

        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        startScreen.addEventListener('click', startGame);

        function startGame() {
            startScreen.style.display = 'none';
            gamePlay = true;
            score = 0;
            speed = 5;
            scoreDisplay.innerText = "Score: " + score;
            
            player.x = 175;
            enemyCar.style.top = '-100px';
            enemyCar.style.left = Math.floor(Math.random() * 350) + 'px';
            
            window.requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (gamePlay) {
                if (keys.ArrowLeft && player.x > 0) { player.x -= player.speed; }
                if (keys.ArrowRight && player.x < 350) { player.x += player.speed; }
                
                myCar.style.left = player.x + 'px';

                let enemyTop = parseInt(window.getComputedStyle(enemyCar).getPropertyValue('top'));
                
                if (enemyTop > 600) {
                    enemyTop = -100;
                    enemyCar.style.left = Math.floor(Math.random() * 350) + 'px';
                    score++;
                    scoreDisplay.innerText = "Score: " + score;
                    
                    if (score % 5 === 0) { speed += 1; }
                } else {
                    enemyCar.style.top = (enemyTop + speed) + 'px';
                }

                if (isCollide(myCar, enemyCar)) {
                    gameOver();
                }

                window.requestAnimationFrame(gameLoop);
            }
        }

        function isCollide(a, b) {
            let aRect = a.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();

            return !(
                aRect.bottom < bRect.top || 
                aRect.top > bRect.bottom || 
                aRect.right < bRect.left || 
                aRect.left > bRect.right
            );
        }

        function gameOver() {
            gamePlay = false;
            startScreen.style.display = 'flex';
            startScreen.innerHTML = `<p>Game Over!<br>Your Score: ${score}<br>Click here to Restart</p>`;
        }
    </script>
</body>
</html>
